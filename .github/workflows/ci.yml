name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Lint — always run
  # -----------------------------------------------------------------------

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: codespell-project/actions-codespell@v2

  # -----------------------------------------------------------------------
  # Typecheck — always run
  # -----------------------------------------------------------------------

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run pyright src/

  typecheck-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run pytest tests/test_typecheck.py -v

  # -----------------------------------------------------------------------
  # Test — always run (single locked env, default Python)
  # -----------------------------------------------------------------------

  test:
    needs: [ruff, codespell, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox run

  # -----------------------------------------------------------------------
  # Full matrix — only on version tags (v*)
  # -----------------------------------------------------------------------

  test-matrix:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ["py313", "py314"]
    name: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox run -e "${{ matrix.env }}"

  compat:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - numpy22
          - numpy23
          - numpy24
          - jax05
          - jax06
          - jax07
          - jax08
          - jax09
          - torch26
          - torch27
          - torch28
          - torch29
          - torch210
          - bt020
          - bt021
          - bt022
          - bt020-jax
          - bt021-jax
          - bt022-jax
          - bt020-torch
          - bt021-torch
          - bt022-torch
          - optree014
          - optree015
          - optree016
          - optree017
          - optree018
          - optree019
    name: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox run -e "${{ matrix.env }}"

  typecheck-matrix:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - pyright1392
          - pyright1400
          - pyright1408
          - mypy115
          - mypy116
          - mypy117
          - mypy118
          - mypy119
          - ty
    name: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox run -e "${{ matrix.env }}"
