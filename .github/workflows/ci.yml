name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: codespell-project/actions-codespell@v2

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run pyright src/

  typecheck-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run pytest tests/test_typecheck.py -v

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    name: test (py${{ matrix.python }})
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox -e "py${{ matrix.python }}"
        env:
          TOX_PYTHON: python${{ matrix.python }}

  numpy-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["numpy22", "numpy23", "numpy24"]
    name: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox -e "${{ matrix.version }}"

  jax-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["jax05", "jax06", "jax07", "jax08", "jax09"]
    name: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox -e "${{ matrix.version }}"

  torch-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["torch26", "torch27", "torch28", "torch29", "torch210"]
    name: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox -e "${{ matrix.version }}"

  beartype-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["bt020", "bt021", "bt022"]
        suffix: ["", "-jax", "-torch"]
    name: ${{ matrix.version }}${{ matrix.suffix }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox -e "${{ matrix.version }}${{ matrix.suffix }}"

  optree-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["optree014", "optree015", "optree016", "optree017", "optree018", "optree019"]
    name: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox -e "${{ matrix.version }}"
