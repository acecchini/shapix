name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: codespell-project/actions-codespell@v2

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run pyright src/

  typecheck-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run pytest tests/test_typecheck.py -v

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
        suffix: ["", "-torch", "-jax", "-all"]
    name: test (py${{ matrix.python }}${{ matrix.suffix }})
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox -e "py${{ matrix.python }}${{ matrix.suffix }}"
        env:
          TOX_PYTHON: python${{ matrix.python }}

  beartype-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["bt020", "bt021", "bt022"]
        suffix: ["", "-torch", "-jax"]
    name: beartype (${{ matrix.version }}${{ matrix.suffix }})
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox -e "${{ matrix.version }}${{ matrix.suffix }}"
