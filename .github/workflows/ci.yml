name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
          src: "src/ tests/"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"
          src: "src/ tests/"

  spelling:
    name: Spell Check with Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions Repository
        uses: actions/checkout@v6
      - name: Spell Check Repo
        uses: crate-ci/typos@v1.45.0

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          enable-cache: true
      - run: uv run --locked pyright src/ tests/typing/
      - run: uv run --locked mypy src/
      - run: uv run --locked ty check src/

  typecheck-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          enable-cache: true
      - run: uv run --locked pytest tests/test_typecheck.py -v

  # -----------------------------------------------------------------------
  # Test — always run (locked dev env)
  # -----------------------------------------------------------------------

  test:
    needs: [ruff, spelling, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      - run: uv run --locked tox run -e dev

  # -----------------------------------------------------------------------
  # PR: fast compat matrix
  # -----------------------------------------------------------------------

  compat-pr:
    if: github.event_name == 'pull_request'
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: [py310, py313]
        beartype: [bt022]
        backend: [numpy24, jax09, torch210, optree019]
        exclude:
          - { python: py310, backend: torch210 }
    name: ${{ matrix.python }}-${{ matrix.beartype }}-${{ matrix.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox run -e "${{ matrix.python }}-${{ matrix.beartype }}-${{ matrix.backend }}"

  typecheck-pr:
    if: github.event_name == 'pull_request'
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { env: py313-bt022-type-pyright1408 }
          - { env: py313-bt022-type-mypy119 }
          - { env: py313-bt022-type-ty }
    name: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox run -e "${{ matrix.env }}"

  # -----------------------------------------------------------------------
  # Push: medium compat matrix
  # -----------------------------------------------------------------------

  compat-push:
    if: github.event_name == 'push'
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: [py310, py312, py313]
        beartype: [bt022]
        backend: [numpy24, jax09, torch210, optree019]
        exclude:
          - { python: py310, backend: torch210 }
    name: ${{ matrix.python }}-${{ matrix.beartype }}-${{ matrix.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox run -e "${{ matrix.python }}-${{ matrix.beartype }}-${{ matrix.backend }}"

  typecheck-push:
    if: github.event_name == 'push'
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { env: py313-bt022-type-pyright1408 }
          - { env: py313-bt022-type-mypy119 }
          - { env: py313-bt022-type-ty }
    name: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox run -e "${{ matrix.env }}"
