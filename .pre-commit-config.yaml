default_language_version:
  python: "3.10"

default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg
  - post-checkout
  - post-merge
  - post-rewrite

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        stages: [pre-commit]
        priority: 0

  - repo: builtin
    hooks:
      - id: trailing-whitespace
        priority: 20
      - id: check-added-large-files
        priority: 10
      - id: check-case-conflict
        priority: 10
      - id: check-illegal-windows-names
        priority: 10
      - id: end-of-file-fixer
        priority: 20
      - id: fix-byte-order-marker
        priority: 20
      - id: check-toml
        priority: 50
      - id: check-vcs-permalinks
        priority: 10
      - id: check-yaml
        priority: 50
      - id: check-merge-conflict
        priority: 10
      - id: check-executables-have-shebangs
        priority: 10
      - id: check-shebang-scripts-are-executable
        priority: 10
    #- id: name-tests-test
    #  args: [--pytest-test-first]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.3
    hooks:
      - id: uv-lock
        priority: 25
      - id: uv-sync
        stages: [post-checkout, post-merge, post-rewrite]
        priority: 0

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        priority: 50

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-format
        args: [--output-format=concise]
        priority: 30
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix, --output-format=concise]
        types_or: [python, pyi]
        require_serial: true
        priority: 40

  - repo: https://github.com/crate-ci/typos
    rev: v1.45.0
    hooks:
      - id: typos
        priority: 40

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        language: python # means renovate will also update `additional_dependencies`
        args:
          - --wrap
          - "80"
          - --extensions
          - mkdocs
          - --extensions
          - frontmatter
        additional_dependencies:
          - mdformat-frontmatter==2.0.10
          - mdformat-mkdocs==v5.2.0b2
        priority: 30

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix
        priority: 40

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.1
    hooks:
      - id: prettier
        types_or: [json, yaml, html, css, javascript]
        priority: 30

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        priority: 50

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright
        stages: [pre-push]
        pass_filenames: false
        priority: 60

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run --locked pytest tests/ -n auto -x -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        priority: 10

  # `actionlint` hook, for verifying correct syntax in GitHub Actions workflows.
  # Some additional configuration for `actionlint` can be found in `.github/actionlint.yaml`.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        stages:
          # This hook is disabled by default, since it's quite slow.
          # To run all hooks *including* this hook, use `uv run prek run -a --stage manual`.
          # To run *just* this hook, use `uv run prek run actionlint -a --stage manual`.
          - manual
        args:
          - "-ignore=SC2129" # ignorable stylistic lint from shellcheck
          - "-ignore=SC2016" # another shellcheck lint: seems to have false positives?
        language: golang # means renovate will also update `additional_dependencies`
        additional_dependencies:
          # actionlint has a shellcheck integration which extracts shell scripts in `run:` steps from GitHub Actions
          # and checks these with shellcheck. This is arguably its most useful feature,
          # but the integration only works if shellcheck is installed
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"
        priority: 10
