<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Connecting faces (trapezoids) -->
  <polygon points="24,2 45,21 34,28 31,14" fill="white" opacity=".1"/>
  <polygon points="45,21 27,46 20,34 34,28" fill="white" opacity=".07"/>
  <polygon points="27,46 3,25 16,19 20,34" fill="white" opacity=".12"/>
  <polygon points="3,25 24,2 31,14 16,19" fill="white" opacity=".09"/>

  <!-- Inner face -->
  <polygon points="31,14 34,28 20,34 16,19" fill="white" opacity=".1"/>

  <!-- Connecting edges -->
  <line x1="24" y1="2" x2="31" y2="14" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
  <line x1="45" y1="21" x2="34" y2="28" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".5"/>
  <line x1="27" y1="46" x2="20" y2="34" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".65"/>
  <line x1="3" y1="25" x2="16" y2="19" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".55"/>

  <!-- Outer quadrilateral (perspective kite) -->
  <polygon points="24,2 45,21 27,46 3,25" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round" opacity=".95"/>

  <!-- Inner quadrilateral (rotated, offset) -->
  <polygon points="31,14 34,28 20,34 16,19" fill="none" stroke="white" stroke-width="1.6" stroke-linejoin="round" opacity=".85"/>
</svg>
