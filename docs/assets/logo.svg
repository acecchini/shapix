<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Semi-transparent connecting faces -->
  <polygon points="5,5 43,5 31,17 17,17" fill="white" opacity=".1"/>
  <polygon points="43,5 43,43 31,31 31,17" fill="white" opacity=".08"/>
  <polygon points="43,43 5,43 17,31 31,31" fill="white" opacity=".06"/>
  <polygon points="5,43 5,5 17,17 17,31" fill="white" opacity=".09"/>

  <!-- Inner face -->
  <rect x="17" y="17" width="14" height="14" rx="1" fill="white" opacity=".1"/>

  <!-- Connecting edges -->
  <line x1="5" y1="5" x2="17" y2="17" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity=".5"/>
  <line x1="43" y1="5" x2="31" y2="17" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity=".55"/>
  <line x1="43" y1="43" x2="31" y2="31" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity=".4"/>
  <line x1="5" y1="43" x2="17" y2="31" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity=".45"/>

  <!-- Outer square -->
  <rect x="5" y="5" width="38" height="38" rx="2" fill="none" stroke="white" stroke-width="1.8" stroke-linejoin="round" opacity=".95"/>

  <!-- Inner square -->
  <rect x="17" y="17" width="14" height="14" rx="1" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" opacity=".7"/>
</svg>
