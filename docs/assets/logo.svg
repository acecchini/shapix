<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Connecting faces (trapezoids) -->
  <polygon points="40,14 14,8 17,20 28,17" fill="white" opacity=".1"/>
  <polygon points="14,8 8,34 20,31 17,20" fill="white" opacity=".08"/>
  <polygon points="8,34 34,40 31,28 20,31" fill="white" opacity=".12"/>
  <polygon points="34,40 40,14 28,17 31,28" fill="white" opacity=".09"/>

  <!-- Inner face -->
  <polygon points="28,17 17,20 20,31 31,28" fill="white" opacity=".1"/>

  <!-- Connecting edges -->
  <line x1="40" y1="14" x2="28" y2="17" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
  <line x1="14" y1="8" x2="17" y2="20" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".55"/>
  <line x1="8" y1="34" x2="20" y2="31" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".65"/>
  <line x1="34" y1="40" x2="31" y2="28" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>

  <!-- Outer square (rotated ~15° CW) -->
  <polygon points="40,14 14,8 8,34 34,40" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round" opacity=".95"/>

  <!-- Inner square (rotated ~15° CCW) -->
  <polygon points="28,17 17,20 20,31 31,28" fill="none" stroke="white" stroke-width="1.6" stroke-linejoin="round" opacity=".85"/>
</svg>
