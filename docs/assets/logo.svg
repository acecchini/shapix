<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="gEdge" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d1c4e9"/>
      <stop offset=".45" stop-color="#b388ff"/>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="gInner" x1="17" y1="17" x2="31" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0d0ff"/>
      <stop offset="1" stop-color="#b388ff"/>
    </linearGradient>
    <linearGradient id="gFace" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d1c4e9"/>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
  </defs>

  <!-- Semi-transparent connecting faces (trapezoids) -->
  <polygon points="5,5 43,5 31,17 17,17" fill="url(#gFace)" opacity=".1"/>
  <polygon points="43,5 43,43 31,31 31,17" fill="url(#gFace)" opacity=".08"/>
  <polygon points="43,43 5,43 17,31 31,31" fill="url(#gFace)" opacity=".06"/>
  <polygon points="5,43 5,5 17,17 17,31" fill="url(#gFace)" opacity=".09"/>

  <!-- Inner face -->
  <rect x="17" y="17" width="14" height="14" rx="1" fill="#b388ff" opacity=".12"/>

  <!-- Connecting edges -->
  <line x1="5" y1="5" x2="17" y2="17" stroke="#d1c4e9" stroke-width="1.3" stroke-linecap="round" opacity=".65"/>
  <line x1="43" y1="5" x2="31" y2="17" stroke="#c4a8ff" stroke-width="1.3" stroke-linecap="round" opacity=".65"/>
  <line x1="43" y1="43" x2="31" y2="31" stroke="#9c6eff" stroke-width="1.3" stroke-linecap="round" opacity=".65"/>
  <line x1="5" y1="43" x2="17" y2="31" stroke="#b388ff" stroke-width="1.3" stroke-linecap="round" opacity=".65"/>

  <!-- Outer square -->
  <rect x="5" y="5" width="38" height="38" rx="2" fill="none" stroke="url(#gEdge)" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Inner square -->
  <rect x="17" y="17" width="14" height="14" rx="1" fill="none" stroke="url(#gInner)" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
