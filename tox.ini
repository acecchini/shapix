[tox]
requires =
    tox-uv>=1
env_list =
    3.12, 3.13, 3.14
    3.12-torch, 3.13-torch, 3.14-torch
    3.12-jax, 3.13-jax, 3.14-jax
    3.12-all, 3.13-all, 3.14-all
    lint
    typecheck
    typecheck-compat
    bt{020,021,022}

[testenv]
runner = uv-venv-lock-runner
description = Run tests under {base_python}
dependency_groups =
    dev
    torch: torch
    jax: jax
    all: torch
    all: jax
commands =
    pytest {posargs:tests/} -v

[testenv:lint]
description = Run ruff linter and formatter checks
skip_install = true
dependency_groups = dev
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:typecheck]
description = Run pyright type checker
dependency_groups = dev
commands =
    pyright src/

[testenv:typecheck-compat]
description = Run type-checker compatibility tests (pyright, mypy, ty)
dependency_groups = dev
commands =
    pytest tests/test_typecheck.py -v

[testenv:bt{020,021,022}]
runner = uv-venv-runner
description = Test with beartype {envname}
deps =
    pytest
    numpy>=2.2.0
    bt020: beartype>=0.20.0,<0.21.0
    bt021: beartype>=0.21.0,<0.22.0
    bt022: beartype>=0.22.0,<0.23.0
commands =
    pytest {posargs:tests/} -v -k "not typecheck"
