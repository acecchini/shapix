[tox]
requires =
    tox-uv>=1
env_list =
    py{312,313,314}
    numpy{22,23,24}
    jax{05,06,07,08,09}
    torch{26,27,28,29,210}
    bt{020,021,022}
    bt{020,021,022}-jax
    bt{020,021,022}-torch
    optree{014,015,016,017,018,019}

# ---------------------------------------------------------------------------
# Primary: locked envs — latest everything from uv.lock
# ---------------------------------------------------------------------------

[testenv]
runner = uv-venv-lock-runner
description = tests ({envname})
dependency_groups =
    dev
commands =
    pytest {posargs:tests/} -v -k "not typecheck"

# ---------------------------------------------------------------------------
# NumPy version compat
# ---------------------------------------------------------------------------

[testenv:numpy{22,23,24}]
runner = uv-venv-runner
description = tests with numpy {envname}
deps =
    pytest
    beartype>=0.22.9
    numpy22: numpy>=2.2.0,<2.3.0
    numpy23: numpy>=2.3.0,<2.4.0
    numpy24: numpy>=2.4.0,<2.5.0
commands =
    pytest {posargs:tests/} -v -k "not typecheck"

# ---------------------------------------------------------------------------
# JAX version compat
# ---------------------------------------------------------------------------

[testenv:jax{05,06,07,08,09}]
runner = uv-venv-runner
description = tests with jax {envname}
deps =
    pytest
    numpy>=2.2.0
    beartype>=0.22.9
    jax05: jax[cpu]>=0.5.0,<0.6.0
    jax06: jax[cpu]>=0.6.0,<0.7.0
    jax07: jax[cpu]>=0.7.0,<0.8.0
    jax08: jax[cpu]>=0.8.0,<0.9.0
    jax09: jax[cpu]>=0.9.0,<0.10.0
commands =
    pytest {posargs:tests/} -v -k "not typecheck"

# ---------------------------------------------------------------------------
# PyTorch version compat
# ---------------------------------------------------------------------------

[testenv:torch{26,27,28,29,210}]
runner = uv-venv-runner
description = tests with torch {envname}
deps =
    pytest
    numpy>=2.2.0
    beartype>=0.22.9
    torch26: torch>=2.6.0,<2.7.0
    torch27: torch>=2.7.0,<2.8.0
    torch28: torch>=2.8.0,<2.9.0
    torch29: torch>=2.9.0,<2.10.0
    torch210: torch>=2.10.0,<2.11.0
commands =
    pytest {posargs:tests/} -v -k "not typecheck"

# ---------------------------------------------------------------------------
# Beartype version compat × backends
# ---------------------------------------------------------------------------

[testenv:bt{020,021,022}{,-jax,-torch}]
runner = uv-venv-runner
description = tests with beartype {envname}
deps =
    pytest
    numpy>=2.2.0
    bt020: beartype>=0.20.0,<0.21.0
    bt021: beartype>=0.21.0,<0.22.0
    bt022: beartype>=0.22.0,<0.23.0
    jax: jax[cpu]>=0.5.0
    torch: torch>=2.6.0
commands =
    pytest {posargs:tests/} -v -k "not typecheck"

# ---------------------------------------------------------------------------
# optree version compat
# ---------------------------------------------------------------------------

[testenv:optree{014,015,016,017,018,019}]
runner = uv-venv-runner
description = tests with optree {envname}
deps =
    pytest
    numpy>=2.2.0
    beartype>=0.22.9
    optree014: optree>=0.14.0,<0.15.0
    optree015: optree>=0.15.0,<0.16.0
    optree016: optree>=0.16.0,<0.17.0
    optree017: optree>=0.17.0,<0.18.0
    optree018: optree>=0.18.0,<0.19.0
    optree019: optree>=0.19.0,<0.20.0
commands =
    pytest {posargs:tests/} -v -k "not typecheck"
