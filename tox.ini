[tox]
requires =
    tox-uv>=1
env_list =
    py{312,313,314}
    py{312,313,314}-torch
    py{312,313,314}-jax
    py{312,313,314}-all
    bt{020,021,022}
    bt{020,021,022}-torch
    bt{020,021,022}-jax

# ---------------------------------------------------------------------------
# Default: lock-file-based testing across Python versions × backends
# ---------------------------------------------------------------------------

[testenv]
runner = uv-venv-lock-runner
description = Run tests under {base_python} ({envname})
dependency_groups =
    dev
    torch: torch
    jax: jax
    all: torch
    all: jax
commands =
    pytest {posargs:tests/} -v -k "not typecheck"

# ---------------------------------------------------------------------------
# Beartype version compatibility × backends (unlocked — uses uv-venv-runner)
# ---------------------------------------------------------------------------

[testenv:bt{020,021,022}{,-torch,-jax}]
runner = uv-venv-runner
description = Test with beartype {envname}
deps =
    pytest
    numpy>=2.2.0
    bt020: beartype>=0.20.0,<0.21.0
    bt021: beartype>=0.21.0,<0.22.0
    bt022: beartype>=0.22.0,<0.23.0
    torch: torch
    jax: jax[cpu]
commands =
    pytest {posargs:tests/} -v -k "not typecheck"
