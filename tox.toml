requires = ["tox>=4.21", "tox-uv>=1.33"]

# Default: single locked-deps test on Python 3.12 (used on every push)
env_list = ["py312"]

[labels]
test = ["py312", "py313", "py314"]
compat = [
  "numpy22", "numpy23", "numpy24",
  "jax05", "jax06", "jax07", "jax08", "jax09",
  "torch26", "torch27", "torch28", "torch29", "torch210",
  "bt020", "bt021", "bt022",
  "bt020-jax", "bt021-jax", "bt022-jax",
  "bt020-torch", "bt021-torch", "bt022-torch",
  "optree014", "optree015", "optree016", "optree017", "optree018", "optree019",
]
typecheck = [
  "pyright1392", "pyright1400", "pyright1408",
  "mypy115", "mypy116", "mypy117", "mypy118", "mypy119",
  "ty",
]

# ---------------------------------------------------------------------------
# Base — shared by all run environments
# ---------------------------------------------------------------------------

[env_run_base]
runner = "uv-venv-runner"
description = "tests ({env_name})"
commands = [
  ["pytest", { replace = "posargs", default = ["tests/"], extend = true }, "-k", "not typecheck"],
]

# ---------------------------------------------------------------------------
# Primary: locked envs (latest everything from uv.lock)
# ---------------------------------------------------------------------------

[env.py312]
runner = "uv-venv-lock-runner"
dependency_groups = ["dev"]

[env.py313]
runner = "uv-venv-lock-runner"
dependency_groups = ["dev"]

# Python 3.14 — torch has no 3.14 wheels yet
[env.py314]
description = "tests (py3.14, no torch)"
deps = [
  "pytest>=9.0.2", "pytest-xdist>=3.5.0",
  "numpy>=2.2.0", "jax[cpu]>=0.5.0", "optree>=0.14.0", "beartype>=0.22.9",
]

