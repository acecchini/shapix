[project]
site_name = "Shapix"
site_url = "https://acecchini.github.io/shapix/"
site_description = "Elegant runtime shape and dtype checking for NumPy, JAX, and PyTorch arrays — powered by beartype."
site_author = "acecchini"
copyright = "Copyright &copy; 2025 – 2026 Shapix contributors"
repo_url = "https://github.com/acecchini/shapix"
repo_name = "acecchini/shapix"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    "getting-started/index.md",
    "getting-started/installation.md",
    "getting-started/quickstart.md",
  ]},
  { "Features" = [
    "features/index.md",
    "features/dimensions.md",
    "features/array-types.md",
    "features/like-types.md",
    "features/tree-annotations.md",
    "features/decorator.md",
    "features/claw.md",
  ]},
  { "API Reference" = [
    "api/index.md",
    "api/shapix.md",
    "api/numpy.md",
    "api/jax.md",
    "api/torch.md",
    "api/optree.md",
    "api/claw.md",
  ]},
  { "Examples" = [
    "examples/index.md",
  ]},
  { "GitHub" = "https://github.com/acecchini/shapix" },
]

[project.theme]
variant = "modern"
custom_dir = "overrides"
language = "en"
favicon = "assets/favicon.png"
features = [
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.path",
  "navigation.indexes",
  "navigation.top",
  "navigation.footer",
  "toc.follow",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "content.footnote.tooltips",
  "content.action.edit",
  "content.action.view",
  "search.highlight",
  "header.autohide",
  "announce.dismiss",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
logo = "lucide/box"
repo = "fontawesome/brands/github"
edit = "lucide/pencil-line"
view = "lucide/eye"

# Light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/acecchini/shapix"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/shapix/"
